<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanyGoal AI | Mchambuzi wa Uhakika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .live-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gray-900 text-white pb-10">

    <header class="bg-blue-900 p-4 sticky top-0 z-50 shadow-2xl border-b border-blue-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-yellow-500 tracking-tighter">STANYGOAL <span class="text-white">AI</span></h1>
            <div class="bg-black/40 px-4 py-1 rounded-full border border-yellow-600">
                <span class="text-[10px] text-gray-400 block uppercase">Salio la Mfano</span>
                <span id="balance" class="font-mono font-bold text-yellow-400">Tsh 1,000</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 space-y-10">

        <section>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Tafuta mechi (mf. Simba vs Yanga)..." class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-yellow-500 outline-none">
                <button onclick="deepSearch()" class="absolute right-2 top-2 bg-yellow-600 px-4 py-2 rounded-lg font-bold">Chambua</button>
            </div>
            <div id="searchResult" class="hidden mt-4 p-4 bg-blue-900/20 border border-blue-500 rounded-xl italic text-sm"></div>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-3 flex items-center"><span class="mr-2">📺</span> Uchambuzi wa Video</h2>
            <div class="video-container bg-black">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?modestbranding=1&rel=0" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-bold mb-4 flex items-center"><span class="mr-2">🔥</span> Tabiri za Uhakika (80%+)</h2>
            <div id="matchGrid" class="grid gap-4 md:grid-cols-2">
                <div class="p-10 text-center text-gray-600">Inatafuta mechi za leo...</div>
            </div>
        </section>

        <section class="bg-gray-800 rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-4 text-yellow-500">🏆 Wafalme wa Utabiri</h2>
            <div id="leaderboard" class="space-y-4 text-sm">
                </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIHbq-1xfqpSLY9u2FW3o-HBQKvqKfhkk",
            authDomain: "stanygoal.firebaseapp.com",
            projectId: "stanygoal",
            storageBucket: "stanygoal.firebasestorage.app",
            messagingSenderId: "56324788686",
            appId: "1:56324788686:web:8cfb0a77c934865d329b9f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Load Matches
        onSnapshot(collection(db, "matches"), (snapshot) => {
            const grid = document.getElementById('matchGrid');
            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const m = doc.data();
                grid.innerHTML += `
                    <div class="bg-gray-800 p-4 rounded-xl border-l-4 ${m.status==='LIVE' ? 'border-red-500' : 'border-yellow-500'}">
                        <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                            <span>${m.league}</span>
                            ${m.status==='LIVE' ? '<span class="text-red-500 live-blink font-bold">LIVE</span>' : ''}
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-lg">${m.match_name}</span>
                            <span class="text-yellow-500 font-mono font-bold">${m.score || '0-0'}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="bg-blue-600 text-[10px] px-2 py-1 rounded font-bold uppercase">${m.prediction}</span>
                            <button onclick="alert('${m.reasoning_sw}')" class="text-xs text-blue-400 underline">Kwanini?</button>
                        </div>
                    </div>`;
            });
        });

        // 2. Search Function
        window.deepSearch = () => {
            const q = document.getElementById('searchInput').value;
            const res = document.getElementById('searchResult');
            res.classList.remove('hidden');
            res.innerHTML = `AI inachambua ${q} kwa Kiswahili...`;
            // Hapa utaongeza Gemini API call baadae
        };
    </script>
</body>
</html>
